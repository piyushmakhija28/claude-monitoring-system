# =============================================================================
# Claude Workflow Engine - Kubernetes Secret
# Sensitive runtime credentials for the workflow engine.
#
# IMPORTANT: Replace the placeholder values with real base64-encoded secrets
# before applying to any cluster.
#
# Generate a base64-encoded value:
#   echo -n 'your-key' | base64
#
# Apply to cluster:
#   kubectl apply -f k8s/secret.yaml -n workflow-engine
#
# Never commit real credentials to version control.
# Use Sealed Secrets, External Secrets Operator, or Vault Agent Injector
# to manage secrets in production Kubernetes environments.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: workflow-engine-secrets
  namespace: workflow-engine
  labels:
    app: workflow-engine
    version: "1.6.1"
type: Opaque
data:
  # Generate with: echo -n 'your-key' | base64
  ANTHROPIC_API_KEY: "REPLACE_WITH_BASE64_VALUE"
  GITHUB_TOKEN: "REPLACE_WITH_BASE64_VALUE"
