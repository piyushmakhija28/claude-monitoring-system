# =============================================================================
# Claude Workflow Engine - Horizontal Pod Autoscaler
# Scales between 2 and 6 replicas based on CPU utilisation.
# The minimum of 2 ensures high availability across availability zones.
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workflow-engine-hpa
  namespace: workflow-engine
  labels:
    app: workflow-engine
    version: "1.6.1"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workflow-engine
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  # Prevent rapid scale-down thrashing: wait 5 minutes before scaling down
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
