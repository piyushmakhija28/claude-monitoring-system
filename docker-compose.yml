# =============================================================================
# Claude Workflow Engine - docker-compose.yml
# Version: 1.6.1
#
# Services:
#   engine  - The workflow orchestration pipeline (the main application)
#   qdrant  - Vector database for RAG decision caching
#   ollama  - Local LLM inference server (optional)
#
# Usage:
#   Full stack (engine + Qdrant + Ollama):
#     docker compose up
#
#   Engine only (standalone, Qdrant disabled):
#     docker compose up engine
#
#   Run a specific task:
#     docker compose run --rm engine --task "your task description"
#
#   View logs:
#     docker compose logs -f engine
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # engine: Claude Workflow Engine (3-level LangGraph pipeline)
  # ---------------------------------------------------------------------------
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-workflow-engine
    image: workflow-engine:1.6.1

    # Load all environment variables from .env file.
    # Required vars: ANTHROPIC_API_KEY, GITHUB_TOKEN
    # Optional vars: OLLAMA_ENDPOINT, CLAUDE_DEBUG, CLAUDE_HOOK_MODE
    # The .env file is excluded from the image via .dockerignore.
    env_file:
      - .env

    # Override or supplement specific environment variables here.
    # These take precedence over values in .env.
    environment:
      # Point Qdrant client at the qdrant service when running as a compose stack.
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # Point Ollama client at the ollama service when running as a compose stack.
      OLLAMA_ENDPOINT: "http://ollama:11434"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      # Enable the lightweight HTTP health server on HEALTH_PORT
      ENABLE_HEALTH_SERVER: "1"
      HEALTH_PORT: "8080"
      METRICS_PORT: "9090"

    ports:
      - "8080:8080"
      - "9090:9090"

    # Bind-mount the project directory for live development.
    # Code changes are immediately reflected without rebuilding the image.
    # Remove this volume for immutable production deployments.
    volumes:
      - .:/app
      - session_logs:/app/logs
      - telemetry_data:/app/telemetry

    # Qdrant must be healthy before the engine starts so that RAG initialisation
    # succeeds on first boot rather than falling back to in-memory mode.
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started

    # The engine is a CLI tool, not a long-running server.
    # It exits after each pipeline run; compose will not restart it automatically.
    restart: "no"

    # Default command: show pipeline help.
    # Override at runtime: docker compose run --rm engine --task "..."
    command: ["--help"]

    # Resource limits - uncomment and tune for production deployments
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.25"

  # ---------------------------------------------------------------------------
  # qdrant: Vector database for RAG decision caching
  # Stores past LangGraph node decisions for semantic similarity lookups.
  # Collections: node_decisions, sessions, flow_traces, tool_calls
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: claude-workflow-qdrant
    restart: unless-stopped

    ports:
      # REST API port - accessible from the host for inspection
      - "6333:6333"
      # gRPC port (optional, used by qdrant-client when grpc is enabled)
      - "6334:6334"

    volumes:
      # Persist vector collections across container restarts
      - qdrant_storage:/qdrant/storage

    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      # Uncomment to enable API key protection on the Qdrant REST API
      # QDRANT__SERVICE__API_KEY: "your-qdrant-api-key"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Resource limits for the vector DB
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # ollama: Local LLM inference server
  # Provides GPU-accelerated inference for supported models.
  # The engine routes to Ollama first (GPU-first hybrid strategy) and falls
  # back to Anthropic/OpenAI cloud providers when Ollama is unreachable.
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: claude-workflow-ollama
    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama_models:/root/.ollama

    environment:
      OLLAMA_HOST: "0.0.0.0"

    # Expose GPU resources when available (requires nvidia container toolkit).
    # Comment out the deploy section if running on CPU-only hardware.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  # Persists Qdrant collections (node_decisions, sessions, flow_traces, tool_calls)
  # across container restarts. Data survives `docker compose down`.
  # To wipe vector data: docker compose down -v
  qdrant_storage:
    driver: local

  # Persists Ollama model weights across container restarts.
  # Large volume: each model is 4-40 GB depending on parameter count.
  ollama_models:
    driver: local

  # Persists pipeline session log files across container restarts.
  session_logs:
    driver: local

  # Persists OpenTelemetry / Prometheus telemetry data.
  telemetry_data:
    driver: local
